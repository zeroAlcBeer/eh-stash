name = "ehstash-api"
main = "src/index.ts"
compatibility_date = "2026-01-15"
compatibility_flags = ["nodejs_compat"]

# Hyperdrive: points at Neon Postgres. Run once to create:
#   wrangler hyperdrive create ehstash-neon \
#     --connection-string="postgresql://USER:PASS@ep-...-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require"
# Then paste the returned id below.
[[hyperdrive]]
binding = "DB"
id = "5b909a31710344cbaad4550c78948ba5"
localConnectionString = "postgresql://postgres:postgres@localhost:5433/eh_stash"

# Thumbnails bucket. Created via:
#   wrangler r2 bucket create eh-stash-thumbs
[[r2_buckets]]
binding = "THUMBS"
bucket_name = "eh-stash-thumbs"

# Per-IP rate limiter. 100 requests per 60 seconds is generous for casual
# browsing (a typical session is 20–30 calls/min) and tight enough that a
# scraper at 1 req/sec gets stopped after ~100s.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 100, period = 60 }
